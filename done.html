<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>応募完了 | SUMUADI ガチャイベント</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#f9d9d3 0%,#f3b8ae 55%,#e8837b 100%);
    color:#fff;text-align:center;padding:24px}
  .box{max-width:400px;width:100%}
  .brand{font-size:14px;letter-spacing:5px;font-weight:bold;opacity:.9}
  .check{font-size:60px;margin:18px 0}
  h1{font-size:22px;margin-bottom:14px;text-shadow:0 2px 10px rgba(0,0,0,.1)}
  .summary{background:rgba(255,255,255,.95);color:#a24b42;border-radius:16px;
    padding:16px 20px;margin:18px 0;font-size:15px;font-weight:bold}
  p{font-size:13.5px;margin-top:14px;line-height:1.9;opacity:.95}
  .btn{display:inline-block;background:rgba(255,255,255,.95);color:#d96a61;font-weight:bold;
    border-radius:28px;padding:14px 30px;font-size:15px;text-decoration:none;
    box-shadow:0 4px 16px rgba(0,0,0,.1);margin-top:20px}
</style>
</head>
<body>
  <div class="box">
    <div class="brand">S U M U A D I</div>
    <div class="check">🎊</div>
    <h1>応募が完了しました！</h1>
    <div class="summary" id="entry-summary"></div>
    <p>
      当選発表日に、このイベントページで<br>
      再度LINEログインして結果をご確認ください。<br><br>
      <strong>番号カードは当選確認に必要です。<br>大切に保管してください。</strong>
    </p>
    <a class="btn" id="qoo10-btn" href="#" style="display:none">Qoo10で商品を見る</a>
  </div>

  <script src="config.js"></script>
  <script>
  (function () {
    var cfg = window.SUMUADI_CONFIG;
    var PRODUCT_LABELS = { toner: "アンプルトナー", cream: "クリーム", serum: "セラム" };
    var raw = sessionStorage.getItem(cfg.ENTRY_STORAGE_KEY);
    var entry = raw ? JSON.parse(raw) : null;

    var summaryEl = document.getElementById("entry-summary");
    if (entry && entry.product) {
      summaryEl.textContent =
        (PRODUCT_LABELS[entry.product] || entry.product) + " No." + entry.ballNumber;
    } else {
      summaryEl.textContent = "ご応募ありがとうございます";
    }

    // TBD: Qoo10 sales page URL — leave hidden until the link is provided.
    var QOO10_URL = "";
    if (QOO10_URL) {
      var btn = document.getElementById("qoo10-btn");
      btn.href = QOO10_URL;
      btn.style.display = "inline-block";
    }
  })();
  </script>
</body>
</html>
