<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUMUADI POP-UP ガチャイベント</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#f9d9d3 0%,#f3b8ae 55%,#e8837b 100%);
    color:#fff;text-align:center;padding:24px}
  .box{max-width:400px}
  .brand{font-size:14px;letter-spacing:5px;font-weight:bold;opacity:.9}
  h1{font-size:30px;margin:14px 0 10px;text-shadow:0 2px 10px rgba(0,0,0,.1)}
  .gacha{font-size:72px;margin:18px 0;display:inline-block;animation:bounce 2.4s infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .soon{background:rgba(255,255,255,.92);color:#d96a61;font-weight:bold;
    border-radius:28px;padding:14px 30px;display:inline-block;font-size:16px;
    box-shadow:0 4px 16px rgba(0,0,0,.1)}
  .cta{background:rgba(255,255,255,.95);color:#d96a61;font-weight:bold;
    border-radius:28px;padding:16px 32px;display:inline-block;font-size:16px;
    box-shadow:0 4px 16px rgba(0,0,0,.1);text-decoration:none}
  p{font-size:13.5px;margin-top:22px;line-height:1.9;opacity:.95}
</style>
</head>
<body>
  <div class="box">
    <div class="brand">S U M U A D I</div>
    <h1>POP-UP<br>ガチャイベント</h1>
    <div class="gacha">🎰</div>
    <div id="cta-area">
      <div class="soon">COMING SOON</div>
      <p>イベントページは只今準備中です。<br>公開までもうしばらくお待ちください✨</p>
    </div>
  </div>

  <script>
  (function () {
    // Set to the line-login Edge Function URL to go live, e.g.
    // "https://ezegqkmoysdwgpcwohlv.functions.supabase.co/line-login?next=entry"
    // Left empty on purpose — flip on only once entry_start/entry_end are configured
    // and the LINE Login channel is out of "Developing" mode.
    var ENTRY_URL = "";

    if (ENTRY_URL) {
      document.getElementById("cta-area").innerHTML =
        '<a class="cta" href="' + ENTRY_URL + '">LINEでログインして応募する</a>' +
        '<p>公式LINEの友だち追加が必要です</p>';
    }
  })();
  </script>
</body>
</html>
