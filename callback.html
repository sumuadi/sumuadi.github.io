<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン処理中 | SUMUADI ガチャイベント</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#ddc5fb 0%,#c7a3f5 55%,#9b7ae0 100%);
    color:#fff;text-align:center;padding:24px}
  .box{max-width:400px;width:100%}
  .brand-logo{height:15px;filter:brightness(0) invert(1);opacity:.95;margin:0 auto 14px;display:block}
  h1{font-size:22px;margin-bottom:12px;text-shadow:0 2px 10px rgba(0,0,0,.1)}
  p{font-size:14px;line-height:1.9;opacity:.95;margin-bottom:18px}
  .hidden{display:none}
  .spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.4);
    border-top-color:#fff;border-radius:50%;margin:0 auto 20px;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .btn{display:inline-block;background:rgba(255,255,255,.95);color:#8a63d6;font-weight:bold;
    border-radius:28px;padding:14px 30px;font-size:15px;text-decoration:none;
    box-shadow:0 4px 16px rgba(0,0,0,.1);border:none;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
  <div class="box" id="state-loading">
    <img class="brand-logo" src="images/logo.png" alt="SUMUADI">
    <div class="spinner"></div>
    <p>ログイン処理中です…<br>そのままお待ちください</p>
  </div>

  <div class="box hidden" id="state-friend-needed">
    <img class="brand-logo" src="images/logo.png" alt="SUMUADI">
    <h1>もう一歩です！</h1>
    <p>応募には公式LINEアカウントの<br>友だち追加が必要です。</p>
    <a class="btn" id="add-friend-btn" href="#">公式LINEを友だち追加する</a><br>
    <a class="btn" id="retry-btn" href="#" style="margin-top:14px">友だち追加を確認する</a>
  </div>

  <div class="box hidden" id="state-error">
    <img class="brand-logo" src="images/logo.png" alt="SUMUADI">
    <h1>エラーが発生しました</h1>
    <p id="error-message">もう一度お試しください。</p>
    <a class="btn" href="index.html">トップに戻る</a>
  </div>

  <script src="config.js"></script>
  <script>
  (function () {
    var cfg = window.SUMUADI_CONFIG;
    var params = new URLSearchParams(window.location.search);

    function show(id) {
      ["state-loading", "state-friend-needed", "state-error"].forEach(function (s) {
        document.getElementById(s).classList.toggle("hidden", s !== id);
      });
    }

    function showError(message) {
      document.getElementById("error-message").textContent = message;
      show("state-error");
    }

    var lineError = params.get("error");
    if (lineError) {
      showError(
        lineError === "access_denied"
          ? "ログインがキャンセルされました。"
          : "LINEログインに失敗しました。"
      );
      return;
    }

    var code = params.get("code");
    var state = params.get("state");
    if (!code || !state) {
      showError("不正なアクセスです。");
      return;
    }

    fetch(cfg.FUNCTIONS_URL + "/line-callback", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code: code, state: state }),
    })
      .then(function (res) {
        return res.json().then(function (data) {
          if (!res.ok) throw data;
          return data;
        });
      })
      .then(function (data) {
        sessionStorage.setItem(
          cfg.SESSION_STORAGE_KEY,
          JSON.stringify({
            token: data.session_token,
            displayName: data.display_name,
            isFriend: data.is_friend,
          })
        );

        if (!data.is_friend) {
          document.getElementById("add-friend-btn").href = cfg.LINE_ADD_FRIEND_URL;
          document.getElementById("retry-btn").href =
            cfg.FUNCTIONS_URL + "/line-login?next=" + encodeURIComponent(data.next || "entry");
          show("state-friend-needed");
          return;
        }

        window.location.href = (data.next || "entry") + ".html";
      })
      .catch(function (err) {
        console.error(err);
        showError("ログインに失敗しました。時間をおいて再度お試しください。");
      });
  })();
  </script>
</body>
</html>
