<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>応募フォーム | SUMUADI ガチャイベント</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    min-height:100vh;
    background:linear-gradient(160deg,#ddc5fb 0%,#c7a3f5 55%,#9b7ae0 100%);
    color:#3d3550;padding:28px 20px 60px;display:flex;justify-content:center}
  .box{max-width:420px;width:100%}
  .brand-logo{height:14px;filter:brightness(0) invert(1);opacity:.95;margin:0 auto 6px;display:block}
  h1{font-size:20px;color:#fff;text-align:center;margin-bottom:8px;
    text-shadow:0 2px 10px rgba(0,0,0,.1)}
  .edit-note{text-align:center;color:#fff;font-size:12.5px;opacity:.9;margin-bottom:18px;
    background:rgba(0,0,0,.12);border-radius:10px;padding:8px 12px;display:none}
  .card{background:#fff;border-radius:20px;padding:22px;margin-bottom:16px;
    box-shadow:0 6px 20px rgba(0,0,0,.08)}
  label.field-label{display:block;font-size:13px;font-weight:bold;color:#6b4fa0;
    margin-bottom:10px}
  .products{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .product{border:2px solid #e4d9f9;border-radius:14px;padding:8px;text-align:center;
    cursor:pointer;transition:.15s}
  .product img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;margin-bottom:6px}
  .product span{font-size:12px;font-weight:bold}
  .product.selected{border-color:#9b7ae0;background:#f5eeff}
  input[type=number],input[type=text]{width:100%;padding:13px 14px;border-radius:12px;
    border:2px solid #e4d9f9;font-size:16px;margin-top:10px}
  input:focus{outline:none;border-color:#9b7ae0}
  .hint{font-size:11.5px;color:#9a8bb8;margin-top:6px;line-height:1.6}
  .agree{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;line-height:1.7;
    color:#6b5a80;margin-top:4px}
  .agree input{margin-top:3px}
  .submit{width:100%;background:linear-gradient(160deg,#a480e6,#9b7ae0);color:#fff;
    font-weight:bold;border:none;border-radius:28px;padding:16px;font-size:16px;
    box-shadow:0 6px 16px rgba(0,0,0,.12);cursor:pointer;margin-top:6px}
  .submit:disabled{opacity:.5;cursor:default}
  .error{background:#fff0ee;color:#c14a3f;font-size:13px;padding:12px 14px;border-radius:10px;
    margin-bottom:14px;display:none;line-height:1.7}
  .center-note{text-align:center;color:#fff;font-size:12px;opacity:.85;margin-top:16px;line-height:1.8}
  .loading{text-align:center;color:#fff;padding:60px 0}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;
    align-items:center;justify-content:center;padding:20px;z-index:10}
  .modal-overlay.show{display:flex}
  .modal{background:#fff;border-radius:20px;padding:26px 22px;max-width:340px;width:100%;
    text-align:center}
  .modal h2{font-size:16px;color:#6b4fa0;margin-bottom:16px}
  .modal .confirm-summary{background:#f5eeff;border-radius:14px;padding:16px;font-size:18px;
    font-weight:bold;color:#8a63d6;margin-bottom:14px}
  .modal p{font-size:12.5px;color:#6b5a80;line-height:1.8;margin-bottom:18px}
  .modal-actions{display:flex;flex-direction:column;gap:8px}
  .modal-actions .submit{margin-top:0}
  .modal-actions .cancel{background:#fff;color:#9088a8;border:1.5px solid #e0d6f5;
    border-radius:28px;padding:14px;font-size:14px;cursor:pointer}
</style>
</head>
<body>
  <div class="box">
    <img class="brand-logo" src="images/logo.png" alt="SUMUADI">
    <h1 id="page-title">ガチャ番号で応募する</h1>
    <div class="edit-note" id="edit-note">すでに応募済みです。内容を修正できます。</div>

    <div id="loading" class="loading">読み込み中…</div>

    <form id="entry-form" class="hidden" style="display:none">
      <div id="error-box" class="error"></div>

      <div class="card">
        <label class="field-label">① 届いたサンプルを選択</label>
        <div class="products">
          <div class="product" data-product="toner" data-max="400">
            <img src="images/toner.png" alt="アンプルトナー">
            <span>アンプルトナー</span>
          </div>
          <div class="product" data-product="cream" data-max="300">
            <img src="images/cream.png" alt="クリーム">
            <span>クリーム</span>
          </div>
          <div class="product" data-product="serum" data-max="200">
            <img src="images/serum.jpg" alt="セラム">
            <span>セラム</span>
          </div>
        </div>
        <div class="hint">※カプセルに入っていたサンプルの種類を選んでください（お好みの商品ではありません）</div>
      </div>

      <div class="card">
        <label class="field-label" for="ball_number">② ガチャ番号</label>
        <input type="number" id="ball_number" name="ball_number" inputmode="numeric" placeholder="番号カードに記載の番号" required>
        <div class="hint" id="range-hint">商品を選択すると入力できる番号の範囲が表示されます</div>
      </div>

      <div class="card">
        <label class="field-label" for="display_name">③ お名前（LINE表示名）</label>
        <input type="text" id="display_name" name="display_name" required maxlength="60">
      </div>

      <div class="card">
        <label class="agree">
          <input type="checkbox" id="agree" required>
          <span>
            <a href="privacy.html" target="_blank" style="color:#6b4fa0">プライバシーポリシー</a>に同意の上、
            個人情報の取扱いに同意します。<br>
            番号カードは当選時の確認に必要です。当選発表まで大切に保管してください。
          </span>
        </label>
      </div>

      <button type="submit" class="submit" id="submit-btn">応募する</button>
    </form>

    <p class="center-note">ご応募はお一人様1回限りです（応募期間中は内容の修正が可能です）</p>
  </div>

  <div class="modal-overlay" id="confirm-modal">
    <div class="modal">
      <h2>番号カードに記載の商品と一致していますか？</h2>
      <div class="confirm-summary" id="confirm-summary"></div>
      <p>手元のガチャ番号カードと、商品・番号が合っているか<br>もう一度ご確認ください。</p>
      <div class="modal-actions">
        <button class="submit" id="confirm-yes">はい、応募する</button>
        <button class="cancel" id="confirm-no">確認し直す</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
  (function () {
    var cfg = window.SUMUADI_CONFIG;
    var raw = sessionStorage.getItem(cfg.SESSION_STORAGE_KEY);
    var session = raw ? JSON.parse(raw) : null;

    if (!session || !session.token) {
      window.location.href = cfg.FUNCTIONS_URL + "/line-login?next=entry";
      return;
    }

    var form = document.getElementById("entry-form");
    var nameInput = document.getElementById("display_name");
    var numberInput = document.getElementById("ball_number");
    var rangeHint = document.getElementById("range-hint");
    var errorBox = document.getElementById("error-box");
    var submitBtn = document.getElementById("submit-btn");
    var isEditMode = false;

    var PRODUCT_LABELS = { toner: "アンプルトナー", cream: "クリーム", serum: "セラム" };
    var PRODUCT_MAX = { toner: 400, cream: 300, serum: 200 };

    var selectedProduct = null;

    function selectProduct(product) {
      selectedProduct = product;
      document.querySelectorAll(".product").forEach(function (p) {
        p.classList.toggle("selected", p.dataset.product === product);
      });
      numberInput.min = 1;
      numberInput.max = PRODUCT_MAX[product];
      rangeHint.textContent = "1〜" + PRODUCT_MAX[product] + " の範囲で入力してください";
    }

    document.querySelectorAll(".product").forEach(function (el) {
      el.addEventListener("click", function () { selectProduct(el.dataset.product); });
    });

    if (session.displayName) nameInput.value = session.displayName;

    fetch(cfg.FUNCTIONS_URL + "/submit-entry", {
      headers: { Authorization: "Bearer " + session.token },
    })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data.entry) {
          isEditMode = true;
          document.getElementById("page-title").textContent = "応募内容を修正する";
          document.getElementById("edit-note").style.display = "block";
          submitBtn.textContent = "修正する";
          selectProduct(data.entry.product);
          numberInput.value = data.entry.ball_number;
        }
      })
      .catch(function (err) { console.error(err); })
      .finally(function () {
        document.getElementById("loading").style.display = "none";
        form.style.display = "block";
      });

    var ERROR_MESSAGES = {
      invalid_product: "商品を選択してください。",
      invalid_ball_number: "番号の形式が正しくありません。範囲をご確認ください。",
      agreement_required: "個人情報の取扱いへの同意が必要です。",
      event_not_configured: "現在準備中です。しばらくしてから再度お試しください。",
      entry_not_started: "応募期間はまだ開始していません。",
      entry_closed: "応募期間は終了しました。",
      participant_not_found: "ログイン情報が確認できません。もう一度ログインしてください。",
      friend_required: "公式LINEの友だち追加が必要です。",
      already_entered: "すでに応募済みです（お一人様1回限りです）。",
      number_taken: "その番号はすでに応募されています。番号をご確認ください。",
      entry_locked: "抽選が既に行われたため、応募内容を変更できません。",
      unauthorized: "ログインの有効期限が切れました。もう一度ログインしてください。",
      db_error: "エラーが発生しました。しばらくしてから再度お試しください。",
    };

    function showError(code) {
      errorBox.textContent = ERROR_MESSAGES[code] || ERROR_MESSAGES.db_error;
      errorBox.style.display = "block";
    }

    // ---- confirm modal ----
    var modal = document.getElementById("confirm-modal");
    var confirmSummary = document.getElementById("confirm-summary");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      errorBox.style.display = "none";

      if (!selectedProduct) {
        showError("invalid_product");
        return;
      }
      if (!numberInput.value) {
        showError("invalid_ball_number");
        return;
      }
      if (!document.getElementById("agree").checked) {
        showError("agreement_required");
        return;
      }

      confirmSummary.textContent = PRODUCT_LABELS[selectedProduct] + " No." + parseInt(numberInput.value, 10);
      modal.classList.add("show");
    });

    document.getElementById("confirm-no").addEventListener("click", function () {
      modal.classList.remove("show");
    });

    document.getElementById("confirm-yes").addEventListener("click", function () {
      modal.classList.remove("show");

      var ballNumber = parseInt(numberInput.value, 10);
      var displayName = nameInput.value.trim();
      submitBtn.disabled = true;

      fetch(cfg.FUNCTIONS_URL + "/submit-entry", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + session.token,
        },
        body: JSON.stringify({
          product: selectedProduct,
          ball_number: ballNumber,
          display_name: displayName,
          agree: true,
        }),
      })
        .then(function (res) {
          return res.json().then(function (data) {
            if (!res.ok) throw data;
            return data;
          });
        })
        .then(function (data) {
          sessionStorage.setItem(
            cfg.ENTRY_STORAGE_KEY,
            JSON.stringify({ product: data.product, ballNumber: data.ball_number })
          );
          window.location.href = "done.html";
        })
        .catch(function (err) {
          var code = err && err.error;
          showError(code);
          submitBtn.disabled = false;

          if (code === "unauthorized" || code === "participant_not_found") {
            sessionStorage.removeItem(cfg.SESSION_STORAGE_KEY);
            setTimeout(function () {
              window.location.href = cfg.FUNCTIONS_URL + "/line-login?next=entry";
            }, 1500);
          }
        });
    });
  })();
  </script>
</body>
</html>
